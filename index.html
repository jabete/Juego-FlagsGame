      .cartoon-shadow {

        75% { transform: translateX(5px); }
      }
      .shake {
        animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
